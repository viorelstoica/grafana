apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    kompose.cmd: kompose convert -c
    kompose.version: 1.34.0 (cbf2835db)
  labels:
    io.kompose.service: busybox
  name: busybox
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: busybox
  template:
    metadata:
      annotations:
        kompose.cmd: kompose convert -c
        kompose.version: 1.34.0 (cbf2835db)
      labels:
        io.kompose.service: busybox
    spec:
      containers:
        - args:
            - /bin/sh
            - -c
            - while true; do echo "$()(date) - busybox"; sleep 1; done
          image: busybox
          name: busybox
      restartPolicy: Always
